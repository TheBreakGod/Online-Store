<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL Easycart - สมัครสมาชิก</title>
    <!-- ลิงก์ CSS -->
    <link rel="stylesheet" href="./css/css-เมนูต่างๆ/register.css">
    <!-- ลิงก์ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <div class="image-01">
                <img src="./ine/พนันงาน เซเว่น-Photoroom-Photoroom.png" 
                     alt="Login Illustration" style="width: 450px;">
            </div>
        </div>

        <div class="form-container" style="padding-right: 250px;">
            <h1>สมัครสมาชิก</h1>
            <form id="registerForm">
                <!-- ชื่อผู้ใช้งาน -->
                <div class="input-group">
                    <label>ชื่อผู้ใช้งาน:</label><span style="color: red;">*</span>
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <!-- อีเมล -->
                <div class="input-group">
                    <label>อีเมล:</label><span style="color: red;">*</span>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <!-- รหัสผ่าน -->
                <div class="input-group">
                    <label>รหัสผ่าน:</label><span style="color: red;">*</span>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <!-- ยืนยันรหัสผ่าน -->
                <div class="input-group">
                    <label>ยืนยันรหัสผ่าน:</label><span style="color: red;">*</span>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>

                <button type="submit" style="width: 580px;">สมัครสมาชิก</button>

                <p id="message"></p>
                <div class="link">
                    <p>มีบัญชีอยู่แล้ว? <a href="./login.html" id="loginLink">เข้าสู่ระบบที่นี่</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- ลิงก์ JavaScript -->
    <script src="./js/js-Login/register.js"></script>
</body>
</html>
