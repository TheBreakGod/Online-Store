<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/css-เมนูต่างๆ/Login.css">
</head>
<body>
    <img src="./ine/ช่วยออกแบบโล้โก้ ALL Easycart ให้หน่อย ขอสวยๆ-Photoroom.png" alt="Login Illustration" style="width: 950px;padding-left: 15px;">

    <div class="container">
        <div class="form-section">
            <h1>Login</h1>

            <form id="loginForm">
                <label>Email:</label><span style="color: red;"> *</span></label>
                <div class="input-group">
                    <input type="email" id="email" placeholder="อีเมล" required="" style="border-right-width: 21px;">
                </div>
                <label>Password:</label><span style="color: red;"> *</span></label>
                <div class="input-group">
                    <input type="password" id="password" placeholder="รหัสผ่าน" required="" style="border-right-width: 21px;">
                </div>
                
                <button class="button">ยืนยัน</button>
                
                <div class="link">
                    <p><a href="./register.html" id="registerLink">สมัครสมาชิก:</a><span style="color: red;"> *</span> / <a href="./reset-password.html" id="resetLink">รีเซ็ตรหัสผ่าน:</a><span style="color: red;"> *</span></p>
                </div>

            </form>
            <p id="message"></p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="popupModal" class="modal">
        <div class="modal-content">
            <div class="modal-body">
                <i class="fas fa-info-circle modal-icon"></i>
                <p id="popupMessage"></p>
            </div>
            <button class="modal-btn" onclick="closePopup()">ตกลง</button>
        </div>
    </div>
    
    <script src="./js/js-Login/Login.js"></script>
  </body>
</html>
