<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลลูกค้า</title>
    <link rel="stylesheet" href="./css/css-เมนูต่างๆ/customer-address.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>จัดการข้อมูลที่อยู่</h1>
    </header>

    <main class="main-content">
        <!-- ส่วนแสดงรายการที่อยู่ ด้านซ้าย -->
        <div class="address-list-container">
            <h2>รายการที่อยู่ที่บันทึก</h2>
            <div id="addressList" class="address-list">
                <p class="no-address">ยังไม่มีข้อมูลที่อยู่</p>
            </div>
        </div>

        <!-- ฟอร์มกรอกข้อมูลที่อยู่ ด้านขวา -->
        <div class="form-section">
            <button class="btn-add-address" onclick="toggleAddressForm()">
                <i class="fas fa-plus"></i> เพิ่มข้อมูลที่อยู่
            </button>

            <form id="addressForm" class="address-form" style="display:none;">
                <h3>กรอกข้อมูลที่อยู่</h3>
                
                <div class="form-group">
                    <label for="name">ชื่อ</label>
                    <input type="text" id="name" placeholder="กรอกชื่อของคุณ" required>
                </div>

                <div class="form-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">เบอร์โทรศัพท์</label>
                    <input type="text" id="phone" placeholder="กรอกเบอร์โทรศัพท์" required>
                </div>

                <div class="form-group">
                    <label for="address">ที่อยู่</label>
                    <input type="text" id="address" placeholder="กรอกที่อยู่ของคุณ" required>
                </div>

                <div class="form-group">
                    <label for="city">จังหวัด</label>
                    <input type="text" id="city" placeholder="กรอกชื่อจังหวัด" required>
                </div>

                <div class="form-group">        
                    <label for="postal">รหัสไปรษณีย์</label>
                    <input type="text" id="postal" placeholder="กรอกรหัสไปรษณีย์" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-save">บันทึกข้อมูล</button>
                    <button type="button" class="btn-cancel" onclick="cancelEdit(); toggleAddressForm();">ยกเลิก</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 ระบบจัดการข้อมูลลูกค้า</p>
    </footer>

    <script src="./js/customer-address.js"></script>
</body>
</html>
