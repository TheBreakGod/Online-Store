<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ CRUD</title>
    <link rel="stylesheet" href="./css/styles2.css">
</head>
<body>
    <div class="container">
        <h1>ระบบจัดการข้อมูลสินค้า</h1>
        
        <!-- CREATE: ฟอร์มเพิ่มสินค้า -->
        <form id="product-form">
            <h2>เพิ่มสินค้า</h2>
            <input type="text" id="product-name" placeholder="ชื่อสินค้า" required>
            <input type="number" id="product-price" placeholder="ราคา" required>
            <button type="submit">เพิ่มสินค้า</button>
        </form>

        <hr>

        <!-- READ: ตารางแสดงรายการสินค้า -->
        <h2>รายการสินค้า</h2>
        <table>
            <thead>
                <tr>
                    <th>ชื่อสินค้า</th>
                    <th>ราคา</th>
                    <th>การจัดการ</th>
                </tr>
            </thead>
            <tbody id="product-table">
                <!-- รายการสินค้าจะถูกเพิ่มที่นี่ -->
            </tbody>
        </table>
    </div>

    <script src="./js/script21.js"></script>
</body>
</html>
