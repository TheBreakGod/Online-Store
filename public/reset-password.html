<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL Easycart - รีเซ็ตรหัสผ่าน</title>
    <link rel="stylesheet" href="./css/css-เมนูต่างๆ/reset-password.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <div class="form-container">
            
            <form id="resetForm">
                <h2>รีเซ็ตรหัสผ่าน</h2> 
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้งาน:<span style="color: red;">*</span></label>
                    <input type="username" id="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <label for="email">อีเมล:<span style="color: red;">*</span></label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
            
                <div class="form-group">
                    <label for="newPassword">รหัสผ่านใหม่:<span style="color: red;">*</span></label>
                    <input type="password" id="newPassword" placeholder="Password" required>
                </div>
            
                <div class="form-group">
                    <label for="confirmPassword">ยืนยันรหัสผ่าน:<span style="color: red;">*</span></label>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
            
                <button type="submit" class="btn">ยืนยัน</button>
                    

            <p id="message"></p>

            <div class="links">
                <a href="./login.html">เข้าสู่ระบบ</a>
                <span> / </span>
                <a href="./register.html">สมัครสมาชิก</a>
            </div>
        </div>
  </form>  

        <div class="image-container">
            <img src="./ine/พนันงาน เซเว่น 01-Photoroom-Photoroom.png" alt="Reset Password Illustration">
        </div>
    </div>

    <script src="./js/js-Login/reset-password.js"></script>
</body>
</html>
